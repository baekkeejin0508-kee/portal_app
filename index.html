<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에듀앱 포털</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Mesh gradient background */
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0.05) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.05) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.05) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* App Icon Animation */
        .app-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Category Tab Animation */
        .cat-tab { transition: all 0.2s; }
        .cat-tab.active {
            background-color: #4F46E5; /* Indigo 600 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <!-- Header -->
    <header class="glass sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold text-xl shadow-lg">
                E
            </div>
            <h1 class="text-2xl font-black tracking-tight text-slate-800">에듀앱 포털</h1>
        </div>
        <div class="flex items-center gap-4">
            <!-- Search -->
            <div class="relative hidden sm:block">
                <input type="text" id="searchInput" placeholder="앱 검색..." class="pl-10 pr-4 py-2 rounded-full bg-white/50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm w-48 focus:w-64">
                <svg class="w-4 h-4 absolute left-3.5 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <!-- Admin Lock Icon -->
            <button onclick="promptAdmin()" class="text-slate-400 hover:text-indigo-600 transition-colors p-2" title="관리자 모드">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Categories -->
    <nav class="w-full px-6 py-4 overflow-x-auto whitespace-nowrap scrollbar-hide border-b border-slate-200/50">
        <div class="flex gap-2" id="categoryContainer">
            <!-- Rendered by JS -->
        </div>
    </nav>

    <!-- Main Grid -->
    <main class="flex-grow p-6 sm:p-8 max-w-7xl mx-auto w-full">
        <!-- Search bar for mobile -->
        <div class="relative sm:hidden mb-6">
            <input type="text" id="searchInputMobile" placeholder="앱 검색..." class="w-full pl-10 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm text-sm">
            <svg class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <div id="appGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-x-4 gap-y-8 justify-items-center">
            <!-- App Cards Rendered by JS -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 opacity-60">
            <svg class="w-16 h-16 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <p class="text-slate-500 font-medium">등록된 앱이 없습니다.</p>
        </div>
    </main>

    <!-- FAB (Floating Action Button) / Footer -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
        <!-- Add App Button (Admin Only) -->
        <button id="addAppBtn" onclick="openAddModal()" class="hidden w-14 h-14 bg-pink-500 hover:bg-pink-600 text-white rounded-full shadow-lg shadow-pink-500/40 flex items-center justify-center transition-transform hover:scale-110 active:scale-95" title="앱 추가">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>
        <!-- Download JSON Button -->
        <button onclick="downloadData()" class="w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg shadow-indigo-500/40 flex items-center justify-center transition-transform hover:scale-110 active:scale-95" title="전체본 다운로드">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </button>
    </div>

    <!-- Footer -->
    <footer class="mt-auto border-t border-slate-200/60 bg-white/50 backdrop-blur-md py-6">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm text-slate-500 flex flex-col items-center gap-2">
            <div class="flex gap-4 mb-1">
                <button onclick="openPolicyModal('terms')" class="hover:text-indigo-600 font-medium transition-colors">이용약관</button>
                <span class="text-slate-300">|</span>
                <button onclick="openPolicyModal('privacy')" class="hover:text-indigo-600 font-bold transition-colors text-slate-700">개인정보처리방침</button>
            </div>
            <p>© 2026 에듀앱 포털. All rights reserved.</p>
            <p class="text-xs text-slate-400">개인정보책임자: 백기진 교사 (서울의료보건고등학교) | 문의: 02-392-5553</p>
        </div>
    </footer>

    <!-- 약관 및 방침 모달 -->
    <div id="policy-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[250] hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-6 flex flex-col max-h-[85vh]">
            <h2 id="policy-title" class="text-2xl font-black mb-4 text-center text-slate-800"></h2>
            
            <div id="policy-content" class="overflow-y-auto flex-grow bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner text-sm text-slate-600 leading-relaxed text-left break-keep">
            </div>
            
            <div class="mt-5 flex-shrink-0">
                <button onclick="closePolicyModal()" class="w-full bg-slate-200 text-slate-700 py-3 rounded-xl font-bold active:scale-95 transition-transform text-base hover:bg-slate-300">닫기</button>
            </div>
        </div>
    </div>

    <!-- Admin Add App Modal -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-indigo-600 p-6 text-white">
                <h2 class="text-xl font-bold">새 웹앱 등록</h2>
                <p class="text-indigo-200 text-sm mt-1">포털 런처에 새로운 앱을 추가합니다.</p>
            </div>
            
            <div class="p-6 overflow-y-auto">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">제목</label>
                        <input type="text" id="appTitle" placeholder="예: 보건앱" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">카테고리</label>
                        <select id="appCategory" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">링크 (URL)</label>
                        <input type="url" id="appUrl" placeholder="https://" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">썸네일 사진</label>
                        <div class="flex items-center justify-center w-full">
                            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors relative overflow-hidden group">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6 text-slate-500" id="uploadPlaceholder">
                                    <svg class="w-8 h-8 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    <p class="text-sm"><span class="font-bold">클릭하여 업로드</span></p>
                                </div>
                                <img id="uploadPreview" class="absolute inset-0 w-full h-full object-cover hidden">
                                <input id="appThumbnail" type="file" class="hidden" accept="image/*" />
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-6 bg-slate-50 border-t border-slate-200 flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 px-4 py-3 rounded-xl font-bold text-slate-600 bg-slate-200 hover:bg-slate-300 transition-colors">취소</button>
                <button onclick="saveApp()" class="flex-[2] px-4 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md shadow-indigo-500/20 transition-transform active:scale-95">반영하기</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] hidden flex-col items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">앱 삭제</h3>
            <p class="text-slate-500 mb-6 text-sm">정말로 이 앱을 런처에서 삭제하시겠습니까?</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 rounded-xl font-bold bg-slate-200 text-slate-700 hover:bg-slate-300">취소</button>
                <button id="confirmDeleteBtn" class="flex-1 py-3 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 shadow-md">삭제</button>
            </div>
        </div>
    </div>

    <script>
        // State
        const CATEGORIES = ['전체앱', '국어', '수학', '영어', '보건', '체육', '창체', '기타'];
        let activeCategory = '전체앱';
        let apps = [];
        let isAdmin = false;
        let searchQuery = '';

        // Default apps for preview if empty
        const defaultApps = [
            { id: 1, title: '보건앱', url: 'https://bogun-app.vercel.app/', category: '보건', thumbnail: 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&w=300&q=80' },
            { id: 2, title: '수학 연산 퀴즈', url: '#', category: '수학', thumbnail: 'https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?auto=format&fit=crop&w=300&q=80' },
            { id: 3, title: '영어 단어장', url: '#', category: '영어', thumbnail: 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?auto=format&fit=crop&w=300&q=80' },
            { id: 4, title: '체육 활동 기록', url: '#', category: '체육', thumbnail: 'https://images.unsplash.com/photo-1461896836934-ffe607ba8211?auto=format&fit=crop&w=300&q=80' }
        ];

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadApps();
            renderCategories();
            renderApps();
            setupSearch();
            setupImageUpload();
        });

        function loadApps() {
            const stored = localStorage.getItem('eduApps');
            if(stored) {
                apps = JSON.parse(stored);
            } else {
                apps = [...defaultApps];
                saveToStorage();
            }
        }

        function saveToStorage() {
            localStorage.setItem('eduApps', JSON.stringify(apps));
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            const select = document.getElementById('appCategory');
            
            container.innerHTML = '';
            select.innerHTML = '';

            CATEGORIES.forEach(cat => {
                // Nav Tab
                const btn = document.createElement('button');
                btn.className = `cat-tab px-5 py-2 rounded-full text-sm font-bold border border-slate-200 ${cat === activeCategory ? 'active' : 'bg-white text-slate-600 hover:bg-slate-50'}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    renderCategories();
                    renderApps();
                };
                container.appendChild(btn);

                // Select Options (skip '전체앱')
                if(cat !== '전체앱') {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.innerText = cat;
                    select.appendChild(opt);
                }
            });
        }

        function renderApps() {
            const grid = document.getElementById('appGrid');
            const emptyState = document.getElementById('emptyState');
            
            grid.innerHTML = '';
            
            let filtered = apps;
            if(activeCategory !== '전체앱') {
                filtered = filtered.filter(a => a.category === activeCategory);
            }
            if(searchQuery) {
                filtered = filtered.filter(a => a.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            if(filtered.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');

                filtered.forEach(app => {
                    const el = document.createElement('div');
                    el.className = 'flex flex-col items-center gap-2 group relative w-full max-w-[96px]';
                    
                    // Admin Delete Badge
                    let deleteHtml = '';
                    if(isAdmin) {
                        deleteHtml = `
                            <button onclick="promptDelete(${app.id}); event.stopPropagation();" class="absolute -top-2 -right-2 w-7 h-7 bg-red-500 text-white rounded-full flex items-center justify-center shadow-md scale-0 group-hover:scale-100 transition-transform z-10 hover:bg-red-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        `;
                    }

                    // Card
                    el.innerHTML = `
                        ${deleteHtml}
                        <a href="${app.url}" target="_blank" class="block w-20 h-20 sm:w-24 sm:h-24 rounded-[22%] bg-white shadow-sm border border-slate-100 overflow-hidden app-card flex-shrink-0 cursor-pointer">
                            <img src="${app.thumbnail}" alt="${app.title}" class="w-full h-full object-cover">
                        </a>
                        <p class="text-xs sm:text-sm font-semibold text-slate-700 text-center w-full truncate px-1">${app.title}</p>
                    `;
                    grid.appendChild(el);
                });
            }
        }

        // Search logic
        function setupSearch() {
            const desktopInput = document.getElementById('searchInput');
            const mobileInput = document.getElementById('searchInputMobile');
            
            const handleSearch = (e) => {
                searchQuery = e.target.value;
                desktopInput.value = searchQuery;
                mobileInput.value = searchQuery;
                renderApps();
            };

            desktopInput.addEventListener('input', handleSearch);
            mobileInput.addEventListener('input', handleSearch);
        }

        // Admin Auth
        function promptAdmin() {
            if(isAdmin) {
                isAdmin = false;
                document.getElementById('addAppBtn').classList.add('hidden');
                alert("관리자 모드가 해제되었습니다.");
                renderApps();
                return;
            }

            const code = prompt("관리자 코드를 입력하세요. (기본: admin123)");
            if(code === "admin123") {
                isAdmin = true;
                document.getElementById('addAppBtn').classList.remove('hidden');
                alert("관리자 모드가 활성화되었습니다. 런처에 앱을 추가하거나 삭제할 수 있습니다.");
                renderApps();
            } else if(code !== null) {
                alert("관리자 코드가 일치하지 않습니다.");
            }
        }

        // Modals
        let thumbnailBase64 = null;

        function openAddModal() {
            const modal = document.getElementById('addModal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
            
            // Reset Form
            document.getElementById('appTitle').value = '';
            document.getElementById('appUrl').value = '';
            document.getElementById('appCategory').value = CATEGORIES[1];
            document.getElementById('uploadPreview').classList.add('hidden');
            document.getElementById('uploadPreview').src = '';
            document.getElementById('uploadPlaceholder').classList.remove('hidden');
            document.getElementById('appThumbnail').value = '';
            thumbnailBase64 = null;
        }

        function closeAddModal() {
            const modal = document.getElementById('addModal');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // Image Upload
        function setupImageUpload() {
            const input = document.getElementById('appThumbnail');
            const preview = document.getElementById('uploadPreview');
            const placeholder = document.getElementById('uploadPlaceholder');

            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        thumbnailBase64 = e.target.result;
                        preview.src = thumbnailBase64;
                        preview.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // Save App
        function saveApp() {
            const title = document.getElementById('appTitle').value.trim();
            const url = document.getElementById('appUrl').value.trim();
            const category = document.getElementById('appCategory').value;

            if(!title || !url || !thumbnailBase64) {
                alert("제목, 링크, 썸네일 이미지를 모두 입력해주세요.");
                return;
            }

            const newApp = {
                id: Date.now(),
                title, url, category, thumbnail: thumbnailBase64
            };

            apps.push(newApp);
            saveToStorage();
            renderApps();
            closeAddModal();
        }

        // Delete App
        let appToDelete = null;
        function promptDelete(id) {
            appToDelete = id;
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
        }

        function closeDeleteModal() {
            const modal = document.getElementById('deleteModal');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); appToDelete = null; }, 300);
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            if(appToDelete) {
                apps = apps.filter(a => a.id !== appToDelete);
                saveToStorage();
                renderApps();
                closeDeleteModal();
            }
        });

        // Download JSON
        function downloadData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(apps, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "edu_apps_backup.json");
            dlAnchorElem.click();
        }

        const termsText = `
<h2 class="text-xl font-bold mb-4 text-slate-800">서비스 이용약관</h2>
<p class="mb-4">본 이용약관(이하 '약관')은 앱뜰(App-Tteul)(이하 '본 서비스')이 제공하는 교육용 웹 애플리케이션 서비스의 이용에 관한 사항을 규정합니다.</p>

<h3 class="font-bold text-slate-800 mb-1 mt-4 text-lg">제1조 (목적)</h3>
